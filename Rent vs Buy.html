<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rent vs Buy — An honest calculator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #F5F0E8; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  /* Custom range slider */
  .rvb-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(15,15,14,0.15);
    border-radius: 999px;
    outline: none;
  }
  .rvb-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px; height: 18px;
    border-radius: 999px;
    background: #D7472A;
    cursor: pointer;
    border: 3px solid #F5F0E8;
    box-shadow: 0 0 0 1px rgba(15,15,14,0.15);
    transition: transform 0.12s;
  }
  .rvb-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .rvb-slider::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 999px;
    background: #D7472A;
    cursor: pointer;
    border: 3px solid #F5F0E8;
    box-shadow: 0 0 0 1px rgba(15,15,14,0.15);
  }

  ::selection { background: #D7472A; color: #fff; }

  /* Scrollbar in inputs panel */
  .rvb-inputs::-webkit-scrollbar { width: 6px; }
  .rvb-inputs::-webkit-scrollbar-track { background: transparent; }
  .rvb-inputs::-webkit-scrollbar-thumb { background: rgba(15,15,14,0.15); border-radius: 999px; }

  /* Mobile */
  @media (max-width: 900px) {
    .rvb-main {
      grid-template-columns: 1fr !important;
    }
    .rvb-inputs {
      position: static !important;
      max-height: none !important;
      padding-right: 0 !important;
    }
  }
  a:hover { color: #D7472A !important; }
  @media (max-width: 700px) {
    .rvb-edu-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="calc.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
